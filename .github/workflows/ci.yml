name: CI
on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: ci
          POSTGRES_PASSWORD: ci
          POSTGRES_DB: wealthos_ci
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U ci" --health-interval 5s --health-timeout 5s --health-retries 10
    env:
      DATABASE_URL: postgresql://ci:ci@localhost:5432/wealthos_ci
      TEST_DATABASE_URL: postgresql://ci:ci@localhost:5432/wealthos_ci
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx prisma validate
        working-directory: packages/db
      - run: npx prisma migrate deploy
        working-directory: packages/db
      - run: npm run typecheck
      - run: npm run lint
      - run: npm run test
